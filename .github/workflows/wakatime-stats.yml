name: Update README Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * *"

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run stats updater
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: mayur-it
        run: python .github/scripts/update_stats.py

      - name: Commit and push
        run: |
          git config user.name "readme-bot"
          git config user.email "readme-bot@github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Updated with Dev Metrics"
          git push
